
# Minimal Mistakes theme
# theme: minimal-mistakes-jekyll
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

# Site settings
title: "Vitalie Duporge"
subtitle: "Researcher and Educator in Human Geography"
url: "https://VitalieDuporge.github.io"

# Masthead image
logo: "/assets/images/avatar.png"

# Favicon
favicon: "/assets/images/favicon.png"

# Author sidebar info
author:
  name: Vitalie Duporge
  bio: "Researcher and Educator in Human Geography"
  avatar: "/assets/images/avatar.png"
  email: vitalie.duporge@bristol.ac.uk
  location: Bristol, UK
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "github.com/janesmith"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "linkedin.com/in/janesmith"
    - label: "Bluesky"
      icon: "fa-brands fa-fw fa-bluesky"
      url: "https://janesmith.bsky.social"
    - label: "Google Scholar"
      icon: "fab fa-fw fa-google-scholar"
      url: "https://scholar.google.co.uk/citations?user=XXXXXXXXXXX"
    - label: "ORCID"
      icon: "fab fa-fw fa-orcid"
      url: "https://orcid.org/XXXX-XXXX-XXXX-XXXX"

# Site Footer
footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:jane.smith@example.com"
    - label: "Bluesky"
      icon: "fa-brands fa-fw fa-bluesky"
      url: "https://bsky.app/profile/janesmith.bsky.social"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/janesmith"
  since: "2026"

# Build settings
markdown: kramdown

# Include/exclude
include:
  - _pages
  - assets/images
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore

# Hide xml feed
atom_feed:
  hide: true

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: # true
      share: true
      related: true
